# Parameters for the wasm-opt -O2 config sweep (.github/workflows/wasm-opt-bench.yml).
# Edit, commit, and push to a bench/** branch to launch a run. Each run replays
# `wasm-opt -O2` over a cached asyncified fixture under the listed configs.
#
# CONFIGS_CONF   space-separated presets, run in order (put the irreplaceable /
#                most-likely-to-finish ones first — a timeout still keeps earlier
#                rows). Presets (see scripts/bench/o2-config-sweep.sh):
#                  baseline                 glibc default, THP as-is (control)
#                  glibc-retain             MALLOC_TRIM_THRESHOLD_=-1 MALLOC_MMAP_MAX_=0
#                  glibc-arenacap           MALLOC_ARENA_MAX=4 (contention-only control)
#                  jemalloc-default         reproduce the prior ~15% result
#                  jemalloc-retain          decay disabled (no madvise purge)
#                  mimalloc-default         mimalloc, default purge
#                  mimalloc-retain          MIMALLOC_PURGE_DELAY=-1 (no purge)
#                  thp-off                  glibc + transparent_hugepage=never
#                  thp-off+glibc-retain     stack
#                  thp-off+jemalloc-retain  stack
#                  thp-off+mimalloc-retain  stack (both top levers)
# CORES_CONF     BINARYEN_CORES for every cell (blank = nproc = 32 on ccx53).
# FIXTURE_RUN_ID_CONF  run id of a prior bench run whose `o2-fixture` artifact to
#                reuse (blank = build the fixture fresh and cache it ~40 min).
# DIAGNOSTIC_CONF  1 = around each config, capture /proc/vmstat + /proc/interrupts
#                deltas and a 60s perf kernel-symbol sample (attributes the kernel
#                time: TLB-shootdown vs THP-compaction). Adds no wall time.
#
# ---- Run #1: build+cache the fixture, diagnose the baseline storm, test the
#      cleanest single-lever fix (mimalloc-retain). Baseline first so the
#      diagnostic is captured before anything can time out. ----
CONFIGS_CONF="baseline mimalloc-retain"
CORES_CONF=""
FIXTURE_RUN_ID_CONF=""
DIAGNOSTIC_CONF="1"

# ---- Planned follow-ups (set FIXTURE_RUN_ID_CONF to run #1's id to skip the build):
#   Run #2  de-confound + expand:  "thp-off jemalloc-retain glibc-retain thp-off+mimalloc-retain"
#   Run #3  core sweep of winner:  CONFIGS="<winner>"  CORES_CONF=8   (then 16, 4)
